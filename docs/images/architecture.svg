<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="archBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1c2333;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141b27;stop-opacity:1" />
    </linearGradient>
    <filter id="boxShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.4" />
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00b4d8" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#archBg)" rx="12" />

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" letter-spacing="1">Architecture Overview</text>
  <rect x="300" y="42" width="200" height="2" rx="1" fill="#00b4d8" opacity="0.5" />

  <!-- ROW 1: Input → Parse → LLM Engine -->

  <!-- Box 1: Text Files -->
  <rect x="30" y="75" width="130" height="65" rx="8" fill="url(#boxGrad)" stroke="#00b4d8" stroke-width="1.5" filter="url(#boxShadow)" />
  <text x="95" y="102" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#00b4d8">📄</text>
  <text x="95" y="122" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#e6edf3">Text Files</text>

  <!-- Arrow 1→2 -->
  <line x1="160" y1="108" x2="195" y2="108" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <!-- Box 2: File Parser -->
  <rect x="200" y="75" width="130" height="65" rx="8" fill="url(#boxGrad)" stroke="#30363d" stroke-width="1" filter="url(#boxShadow)" />
  <text x="265" y="102" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#00b4d8">📋</text>
  <text x="265" y="122" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#e6edf3">File Parser</text>

  <!-- Arrow 2→3 -->
  <line x1="330" y1="108" x2="365" y2="108" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <!-- Box 3: LLM Sentiment Engine (wider, accent border) -->
  <rect x="370" y="70" width="180" height="75" rx="8" fill="url(#boxGrad)" stroke="#00b4d8" stroke-width="2" filter="url(#boxShadow)" />
  <text x="460" y="98" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#00b4d8">🤖</text>
  <text x="460" y="116" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#e6edf3">LLM Sentiment</text>
  <text x="460" y="132" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#e6edf3">Engine</text>

  <!-- Arrow 3→down (vertical connector) -->
  <line x1="460" y1="145" x2="460" y2="185" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <!-- ROW 2: Distribution Calculator → Trend Analyzer → Word Cloud Generator -->

  <!-- Box 4: Distribution Calculator -->
  <rect x="370" y="190" width="180" height="65" rx="8" fill="url(#boxGrad)" stroke="#30363d" stroke-width="1" filter="url(#boxShadow)" />
  <text x="460" y="217" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#00b4d8">📊</text>
  <text x="460" y="237" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#e6edf3">Distribution Calc</text>

  <!-- Arrow 4→left -->
  <line x1="370" y1="222" x2="335" y2="222" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <!-- Box 5: Trend Analyzer -->
  <rect x="200" y="190" width="130" height="65" rx="8" fill="url(#boxGrad)" stroke="#30363d" stroke-width="1" filter="url(#boxShadow)" />
  <text x="265" y="217" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#00b4d8">📈</text>
  <text x="265" y="237" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#e6edf3">Trend Analyzer</text>

  <!-- Arrow 4→right -->
  <line x1="550" y1="222" x2="585" y2="222" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <!-- Box 6: Word Cloud Generator -->
  <rect x="590" y="190" width="160" height="65" rx="8" fill="url(#boxGrad)" stroke="#30363d" stroke-width="1" filter="url(#boxShadow)" />
  <text x="670" y="217" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#00b4d8">☁️</text>
  <text x="670" y="237" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#e6edf3">Word Cloud Gen</text>

  <!-- ROW 3: Outputs -->

  <!-- Connector lines down from Row 2 boxes -->
  <line x1="265" y1="255" x2="265" y2="295" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <line x1="460" y1="255" x2="460" y2="295" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#arrowhead)" />
  <line x1="670" y1="255" x2="670" y2="295" stroke="#00b4d8" stroke-width="1.5" marker-end="url(#arrowhead)" />

  <!-- Box 7: Rich CLI Output -->
  <rect x="175" y="300" width="180" height="65" rx="8" fill="url(#boxGrad)" stroke="#00b4d8" stroke-width="1.5" filter="url(#boxShadow)" />
  <text x="265" y="327" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#00b4d8">🖥️</text>
  <text x="265" y="347" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#e6edf3">Rich CLI Output</text>

  <!-- Box 8: JSON Export -->
  <rect x="390" y="300" width="140" height="65" rx="8" fill="url(#boxGrad)" stroke="#00b4d8" stroke-width="1.5" filter="url(#boxShadow)" />
  <text x="460" y="327" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#00b4d8">📥</text>
  <text x="460" y="347" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#e6edf3">JSON Export</text>

  <!-- Box 9: Web Dashboard -->
  <rect x="570" y="300" width="180" height="65" rx="8" fill="url(#boxGrad)" stroke="#00b4d8" stroke-width="1.5" filter="url(#boxShadow)" />
  <text x="660" y="327" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#00b4d8">🌐</text>
  <text x="660" y="347" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="bold" fill="#e6edf3">Web Dashboard</text>

  <!-- Side label: Ollama / Gemma3:4b -->
  <rect x="610" y="78" width="150" height="50" rx="6" fill="url(#boxGrad)" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3" />
  <text x="685" y="100" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#8b949e">Ollama Local LLM</text>
  <text x="685" y="118" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="bold" fill="#00b4d8">gemma3:4b</text>

  <!-- Dashed line connecting LLM label to engine -->
  <line x1="610" y1="103" x2="553" y2="103" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3" />
</svg>
