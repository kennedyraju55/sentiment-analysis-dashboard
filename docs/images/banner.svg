<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b4d8;stop-opacity:0" />
      <stop offset="20%" style="stop-color:#00b4d8;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#00b4d8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00b4d8;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b4d8;stop-opacity:0.05" />
      <stop offset="50%" style="stop-color:#00b4d8;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#00b4d8;stop-opacity:0.05" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bgGrad)" rx="12" />

  <!-- Wave decoration bottom -->
  <path d="M0,170 Q100,150 200,165 T400,160 T600,170 T800,155 L800,200 L0,200 Z" fill="url(#waveGrad)" />
  <path d="M0,180 Q150,165 300,178 T600,172 T800,180 L800,200 L0,200 Z" fill="url(#waveGrad)" />

  <!-- Decorative circles (sentiment emoji-like shapes) -->
  <circle cx="90" cy="70" r="22" fill="none" stroke="#00b4d8" stroke-width="1.5" opacity="0.3" />
  <text x="90" y="77" text-anchor="middle" font-size="20" fill="#00b4d8" opacity="0.4">😊</text>

  <circle cx="710" cy="65" r="22" fill="none" stroke="#00b4d8" stroke-width="1.5" opacity="0.3" />
  <text x="710" y="72" text-anchor="middle" font-size="20" fill="#00b4d8" opacity="0.4">😞</text>

  <circle cx="750" cy="130" r="16" fill="none" stroke="#00b4d8" stroke-width="1" opacity="0.2" />
  <text x="750" y="136" text-anchor="middle" font-size="14" fill="#00b4d8" opacity="0.3">😐</text>

  <circle cx="55" cy="140" r="14" fill="none" stroke="#00b4d8" stroke-width="1" opacity="0.2" />

  <!-- Dot pattern decoration -->
  <circle cx="130" cy="40" r="2" fill="#00b4d8" opacity="0.15" />
  <circle cx="150" cy="35" r="1.5" fill="#00b4d8" opacity="0.12" />
  <circle cx="670" cy="45" r="2" fill="#00b4d8" opacity="0.15" />
  <circle cx="650" cy="38" r="1.5" fill="#00b4d8" opacity="0.12" />
  <circle cx="690" cy="150" r="1.5" fill="#00b4d8" opacity="0.1" />

  <!-- Accent bar -->
  <rect x="250" y="105" width="300" height="3" rx="1.5" fill="url(#accentGrad)" filter="url(#glow)" />

  <!-- Title text -->
  <text x="400" y="80" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="34" font-weight="bold" fill="#ffffff" letter-spacing="1">
    Sentiment Analysis Dashboard
  </text>

  <!-- Tagline -->
  <text x="400" y="138" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#8b949e" letter-spacing="2">
    AI-Powered Sentiment Intelligence &amp; Trends
  </text>

  <!-- Thin top accent line -->
  <rect x="0" y="0" width="800" height="3" rx="0" fill="#00b4d8" opacity="0.6" />
</svg>
